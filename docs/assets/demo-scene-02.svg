  <text x="1740" y="678" text-anchor="end" fill="#effcf3" font-family="Helvetica Neue, Helvetica, Arial" font-size="39">The number stays inside</text>
  <text x="1740" y="728" text-anchor="end" fill="#a7cbb4" font-family="Helvetica Neue, Helvetica, Arial" font-size="28">the indicator — clear at a glance.</text>
  <text x="960" y="926" text-anchor="middle" fill="#88b99d" font-family="Helvetica Neue, Helvetica, Arial" font-size="27">Running state and remaining quota, always in the notch.</text>
