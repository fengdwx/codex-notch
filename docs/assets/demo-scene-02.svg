  <text x="180" y="560" fill="#71e4a5" font-family="Helvetica Neue, Helvetica, Arial" font-size="26" letter-spacing="4">LIVE TASK STATE</text>
  <text x="180" y="678" fill="#effcf3" font-family="Helvetica Neue, Helvetica, Arial" font-size="39">A restrained running echo</text>
  <text x="180" y="728" fill="#a7cbb4" font-family="Helvetica Neue, Helvetica, Arial" font-size="28">keeps one active task visible.</text>
