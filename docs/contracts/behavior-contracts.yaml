  - id: NOTCH-LAYOUT-032
    title: Compact completion balances its left and right visual reach
    status: superseded
    statement: The compact island retains its 261pt total width for a 185pt camera cutout and its 50pt indicator lanes. The right quota indicator remains centered in the 38pt visible wing with 7pt between the 24pt ring and both wing edges; the left ChatGPT mark does not move. With Reduce Motion disabled, completion preserves the full-circumference inner and outer firework, including its camera-side particles, four endpoint sparks, warm-coral accents, white ignition, vertical travel, brightness, and timing. The glow-aware firework geometry must occupy no more than 32pt horizontally, leave at least 3pt beside each wing edge, and keep the absolute difference between its left and right visual reaches at or below 0.25pt. The animation finishes within 0.9 seconds and stays behind the readable percentage. Reduce Motion suppresses the firework while preserving the static completed state.
    rationale: >-
      Physical-notch review found that the compressed firework still looked crowded on the right because its direct-right coral spark extended 0.592pt farther than the direct-left edge. Pulling only that endpoint inward makes both visual reaches nearly equal without moving the ring, narrowing the island, or weakening the rest of the burst.
    source: user-confirmed-physical-notch-feedback
    owner: project-maintainer
    risk: medium
