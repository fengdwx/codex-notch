  - id: QUOTA-SEMANTICS-012
    title: Weekly quota uses green, yellow, and deep-red warning tiers
    status: superseded
    statement: The right side prioritizes the weekly quota's remaining percentage; the number stays inside the ring or wave ball; the ring gap starts at 12 o'clock and progresses clockwise. Remaining quota above 20% is green, above 10% and up to 20% is yellow, and 10% or less is deep red; hue no longer changes continuously with the percentage. While a task is running, the ring uses a monochrome light-to-dark gradient for the current tier without a white highlight; with Reduce Motion disabled, the gradient flows gently along the remaining-quota arc. Idle and completed states must immediately use a single solid color for the current tier and must not retain a static gradient or independently rotating highlight arc. The wave ball uses the same three tiers and rises and falls only while a task is running and Reduce Motion is disabled; idle and completed states keep a still liquid level. Expanded quota, reset, and recent-conversation text uses readable sizes and matching line heights; the quota bar is followed first by the current weekly reset timestamp and a second-level countdown; the full “N reset credits available” row is clickable, and the card expands only downward to list each `rate-limit-reset-credits` item with `status=available`, its exact expiry time, and a second-level countdown without repeating the reset-credit name. The real notch in Settings is the live preview, with no duplicate static preview card; the lower-right of the expanded panel must provide a Settings entry.
    rationale: Keeping most available quota a stable green reduces visual noise; yellow begins at 20% as a warning, while deep red begins at 10% as a strong alert. Three tiers are clearer than a continuous rainbow hue. Running state changes only the lightness of the same tier color, retaining activity while avoiding a flashy white highlight or cross-hue gradient.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, quota-expanded-state, settings]
      exclude: [cost-estimation]
    examples:
      positive: 35% is green, 20% is yellow, and 10% is deep red; while running, only the current tier's monochrome light-to-dark gradient moves along the ring arc, and it immediately becomes the corresponding solid color when stopped; the ring, wave ball, expanded percentage, and quota bar use the same color.
      negative: Quota continuously changes hue from red to green, 20% remains green, 10% remains yellow, the running gradient includes a jarring white highlight, or idle and completed states continue to show a gradient.
    guards:
      - Tests/CodexNotchTests/NotchTextTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: inspect green, yellow and deep-red quota states on physical-notch hardware"
      - "manual: inspect the running monochrome gradient and stopped solid ring"
    supersedes: [QUOTA-SEMANTICS-008]
    superseded_by: QUOTA-SEMANTICS-013
    last_verified_commit: 778fdc9

  - id: QUOTA-SEMANTICS-013
    title: Weekly quota uses three warning tiers with a stronger compact ring
    status: active
    statement: The right side prioritizes the weekly quota's remaining percentage; the number stays inside the ring or wave ball; the ring gap starts at 12 o'clock and progresses clockwise. The compact ring stroke is 2.25pt and the wave-ball edge remains 1.75pt. Remaining quota above 20% is green, above 10% and up to 20% is yellow, and 10% or less is deep red; hue no longer changes continuously with the percentage. While a task is running, the ring uses a monochrome light-to-dark gradient for the current tier without a white highlight; with Reduce Motion disabled, the gradient flows gently along the remaining-quota arc. Idle and completed states must immediately use a single solid color for the current tier and must not retain a static gradient or independently rotating highlight arc. The wave ball uses the same three tiers and rises and falls only while a task is running and Reduce Motion is disabled; idle and completed states keep a still liquid level. Expanded quota, reset, and recent-conversation text uses readable sizes and matching line heights; the quota bar is followed first by the current weekly reset timestamp and a second-level countdown; the full “N reset credits available” row is clickable, and the card expands only downward to list each `rate-limit-reset-credits` item with `status=available`, its exact expiry time, and a second-level countdown without repeating the reset-credit name. The real notch in Settings is the live preview, with no duplicate static preview card; the lower-right of the expanded panel must provide a Settings entry.
    rationale: Keeping most available quota a stable green reduces visual noise; yellow begins at 20% as a warning, while deep red begins at 10% as a strong alert. Three tiers are clearer than a continuous rainbow hue. A 2.25pt ring is easier to distinguish on a real notch while remaining restrained inside the 24pt diameter; the wave-ball edge keeps its original stroke to avoid unrequested visual weight. Running state changes only the lightness of the same tier color, retaining activity while avoiding a flashy white highlight or cross-hue gradient.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, quota-expanded-state, settings]
      exclude: [cost-estimation]
    examples:
      positive: 35% is green, 20% is yellow, and 10% is deep red; the compact ring is 2.25pt, the wave-ball edge remains 1.75pt, and both outer diameters and internal number positions stay unchanged; while running, only the current tier's monochrome light-to-dark gradient moves along the arc, and it immediately becomes the corresponding solid color when stopped; the ring, wave ball, expanded percentage, and quota bar use the same color.
      negative: Shrinking the ring's outer diameter, squeezing the internal percentage, thickening the wave-ball edge at the same time, continuously changing hue from red to green, keeping 20% green, keeping 10% yellow, adding a jarring white highlight to the running gradient, or continuing to show a gradient while idle or completed.
    guards:
      - Tests/CodexNotchTests/NotchTextTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: inspect green, yellow and deep-red quota states on physical-notch hardware"
      - "manual: inspect the compact ring stroke and wave-ball border"
    supersedes: [QUOTA-SEMANTICS-012]
    superseded_by: null
    last_verified_commit: 9837df1

  - id: PRIVACY-BOUNDARY-005
    title: Local authentication and conversation content must not be persisted or exposed
    status: active
    statement: Authentication tokens are used only in process memory; they must not be written to the repository, app cache, or logs; user-message bodies must not be displayed or recorded; the no-notch fallback must not broaden content exposure.
    rationale: The app reads local ChatGPT/Codex login state and session logs, so minimizing exposure is a non-negotiable boundary.
    source: technical-constraint
    owner: project-maintainer
    risk: critical
    scope:
      include: [auth-reader, usage-client, rollout-monitor, logs, fallback-menu]
      exclude: [user-provided project names and thread identifiers needed for navigation]
    examples:
      positive: The Authorization header from a usage request does not enter logs; the expanded list shows only summary titles and project names.
      negative: Committing auth.json, printing a token, caching the complete usage response, or displaying a user-message body.
    guards:
      - Tests/CodexNotchTests/CodexAuthReaderTests.swift
      - "manual: sensitive-diff and runtime-log review until a dedicated secret scanner exists"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: PACKAGE-VERIFY-006
    title: A distributable app must come from a verified build
    status: active
    statement: Any CodexNotch.app claimed to be runnable or distributable must be built from the current worktree and verified through the bundle, Info.plist, and codesign checks; a release ZIP must be generated by the release script.
    rationale: Passing source tests does not prove that the app bundle launches or is correctly signed.
    source: technical-constraint
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, local-release]
      exclude: [remote-release-upload]
    examples:
      positive: './scripts/verify.sh builds and verifies dist/CodexNotch.app.'
      negative: Running only `swift test` and claiming that the release is installable, or verifying an old bundle and then replacing its binary with a new one.
    guards:
      - scripts/build_app.sh
      - scripts/verify_app.sh
      - scripts/verify.sh
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: APP-IDENTITY-007
    title: The app bundle provides an original and complete icon
    status: superseded
    statement: CodexNotch.app's Info.plist must declare the CodexNotch icon and Resources must contain a complete .icns representation; the icon uses an original vector design with a deep-green terminal window, a small notch slot at the top, and a green `>_` prompt, with no account, authentication, or conversation data.
    rationale: Finder, Launchpad, and the installer need a stable recognizable app identity; a clear terminal outline and high-contrast green prompt should preserve the product's Codex identity at small sizes, while the small top notch echoes the physical notch. Icon generation must not broaden local-data exposure or appropriate another product's brand assets.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, finder, launchpad]
      exclude: [notch-screens, chatgpt-assets, user-data]
    examples:
      positive: The built app contains CodexNotch.icns in Resources, and the file includes a 1024px representation with the original deep-green terminal `>_` graphic.
      negative: Info.plist points to a missing icon, the repository contains only a design source without bundling the icon into the app, or the icon is drawn as a large bowl-like outline without terminal meaning.
    guards:
      - Resources/AppIcon.svg
      - scripts/build_icon.sh
      - scripts/verify_app.sh
      - "manual: inspect the app icon in Finder or Launchpad"
    supersedes: []
    superseded_by: APP-IDENTITY-016
    last_verified_commit: 9fd7a89

  - id: APP-IDENTITY-016
    title: The app bundle uses a black-notch command-prompt icon
    status: active
    statement: CodexNotch.app's Info.plist must declare the CodexNotch icon and Resources must contain a complete .icns representation; the icon uses the user-specified light background, black horizontal notch shell, centered top cutout, white `>_` command prompt on the left, and four-corner green sparkle on the right, with no account, authentication, or conversation data.
    rationale: The icon must match the user-specified product identity and remain directly recognizable in Finder, Launchpad, and the installer as a “Codex command prompt in the notch”; the ChatGPT status icon inside the compact notch is a separate interaction and must not be replaced by the app-bundle icon.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, finder, launchpad, app-icon]
      exclude: [notch-screens, compact-state, chatgpt-assets, user-data]
    examples:
      positive: The built app contains a complete CodexNotch.icns in Resources, Finder shows the black notch shell, white `>_`, and green sparkle, and the compact notch still shows the ChatGPT visual according to task state.
      negative: The installer retains the old deep-green terminal-window icon, lacks a high-resolution icon representation, or mistakenly replaces the app icon with the running-state ChatGPT mark.
    guards:
      - Resources/AppIcon.svg
      - Tests/CodexNotchTests/AppIconAssetTests.swift
      - scripts/build_icon.sh
      - scripts/verify_app.sh
      - "manual: inspect the app icon in Finder or Launchpad after replacing the app"
    supersedes: [APP-IDENTITY-007]
    superseded_by: null
    last_verified_commit: e27336c
