      positive: When a weekly window exists, show its remaining number; expanded quota, reset, and recent-conversation text is readable; the current weekly reset timestamp and countdown remain below the quota bar; every point in the “N reset credits available” row is clickable and reveals all `status=available` `expires_at` values and countdowns in large type without repeating Full reset; wave-ball text does not cover the liquid and the ball moves only while a task runs; the ring uses a gradient only while a task runs and immediately becomes the current quota's solid color when idle or completed; Settings has no duplicate preview card and the expanded panel can open Settings; exactly 20% is still green.
      negative: Fabricating weekly quota from only a rolling window, using the quota window's reset_at instead of reset-credit expires_at, showing redeemed credits, triggering a reset action, or expanding reset details upward; a static gradient, wave, or ring gradient keeps moving while idle or completed, the ring has an extra independently rotating highlight arc, or Settings keeps a static preview that is not synchronized with the real notch.
    guards:
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
      - Tests/CodexNotchTests/NotchTextTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: expanded quota panel inspection"
      - "manual: ring and wave-ball inspection"
