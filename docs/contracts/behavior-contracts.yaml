  - id: DISPLAY-TRANSITION-010
    title: Projection and screen changes must not trigger menu-bar fallback recursion
    status: active
    statement: The app must remain alive when projection, disconnection, or another screen-parameter change switches between the notch window and the menu-bar fallback. Visibility and autosave preferences written by NSStatusItem must not be treated as app settings that trigger another running-state render; the runtime coordinator responds only to app preferences that actually affect its state or layout.
    rationale: macOS synchronously writes UserDefaults while creating, showing, or hiding an NSStatusItem; broadly observing every preference and immediately rebuilding the fallback causes re-entrant recursion and a main-thread stack overflow.
    source: incident
    owner: project-maintainer
    risk: high
    scope:
      include: [screen-parameter-changes, notch-screens, menu-bar-fallback, settings]
      exclude: [quota-fetching, rollout-parsing]
    examples:
      positive: The app continues running after projection starts or stops, the menu-bar fallback appears or hides normally, and a recent-conversation-count change still updates layout live.
      negative: A screen change caused by projection repeatedly creates NSStatusItem, or a system menu-bar visibility preference causes render recursion until the app exits.
    guards:
      - Tests/CodexNotchTests/NotchRuntimePreferencesTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: connect and disconnect screen projection while a task is running"
    supersedes: []
    superseded_by: null
    last_verified_commit: 14271f5

