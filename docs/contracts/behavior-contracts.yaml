  - id: NOTCH-LAYOUT-037
    title: Compact completion firework is uniformly radial
    status: active
    statement: >-
      For a 185pt camera cutout, the compact island keeps its 36pt black wings, 257pt total width, and two 46pt indicator lanes. The left ChatGPT mark remains 18pt and the right quota ring or wave ball remains 22pt; both retain their unshifted symmetric centers 13pt from the adjacent camera edge. With Reduce Motion disabled, seven inner particles remain inside the ring. The exterior firework is intentionally independent of the camera boundary: twelve particles are distributed every 30 degrees and eight endpoint sparks every 45 degrees around the full circle. Each exterior element has an opposite element with the same radius, size, color, and timing, including matching warm-coral particles and stars on the direct left and right axes. Camera-facing effects may pass beneath the physical cutout rather than being shortened; the screen-facing edge retains at least 8pt of clearance, the percentage stays readable, and the animation finishes within 0.9 seconds. Reduce Motion suppresses the firework while preserving the static completed state.
    rationale: >-
      The camera-contained comparison still appeared weaker on the left because it necessarily used fewer and shorter stars. The user requested an uncontrolled version to judge the underlying animation itself. A fixed 30-degree particle grid and 45-degree spark grid make the generated firework mathematically uniform; any remaining left-side loss on real hardware can therefore be attributed to the physical camera cutout instead of asymmetric animation data.
