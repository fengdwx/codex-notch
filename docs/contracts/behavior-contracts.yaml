      negative: Shrinking the entire left safe area or moving the right quota indicator to compensate for the mark, or using different left-mark body sizes for running, completed, and idle states.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-013]
    superseded_by: NOTCH-LAYOUT-019
    last_verified_commit: ff03e1c

  - id: NOTCH-LAYOUT-019
    title: Compact island keeps narrow balanced wings around the physical notch
    status: superseded
    statement: The compact notch derives its visible width from the physical camera cutout plus one 38pt wing on each side. Each wing keeps its 24pt alignment container centered with 7pt of horizontal breathing room, while the left ChatGPT mark and running echo retain their 18pt optical correction. Switching the right indicator between a ring and wave ball or changing activity state must not widen the compact island, move either indicator toward the camera cutout, or change the expanded-card width.
    rationale: The former 52pt wings reserved space for a quota number beside the indicator, but the number now always appears inside the ring or wave ball. Keeping that obsolete allowance made the visible island 28pt wider than needed on a 14-inch notch; 38pt wings preserve safe centering without excessive black width.
    source: user-feedback
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback, expanded-card-width]
    examples:
      positive: A 185pt physical camera cutout produces a 261pt compact island with one centered 24pt indicator in each 38pt wing, and hover still expands into the unchanged 420pt card.
      negative: The compact island retains 52pt wings, an indicator touches the camera cutout, or reducing compact width also shrinks the expanded card.
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-014]
    superseded_by: NOTCH-LAYOUT-020
    last_verified_commit: null

  - id: NOTCH-LAYOUT-020
    title: Compact indicators balance a narrower center with wider outer breathing room
    status: superseded
    statement: The compact island keeps its physical camera cutout plus 38pt visible extension on each side, preserving the 261pt total width for a 185pt cutout. Inside that unchanged surface, each indicator uses a 44pt layout lane so the left and right indicators move 3pt toward the camera, their outer breathing room grows from 7pt to 10pt, and the 24pt quota indicator remains 4pt clear of the camera edge. The left ChatGPT mark retains its 18pt optical correction. Activity state, quota style, and expansion must not change this balance or the 420pt expanded-card width.
    rationale: Real-notch inspection showed that merely narrowing the island left too much perceived empty space between the indicators. Separating visible side extension from indicator-lane width redistributes the existing 261pt surface toward wider outer margins and a tighter visual center without widening the island or placing content under the camera.
    source: user-request
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback, expanded-card-width]
    examples:
      positive: A 185pt camera cutout still produces a 261pt island, while two 44pt indicator lanes leave a 173pt center spacer and keep the 24pt quota ring 4pt outside the camera edge.
      negative: Widening the whole compact island to create larger outer margins, leaving both indicators in the former 38pt lanes, or moving either visible indicator beneath the physical camera cutout.
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-019]
    superseded_by: NOTCH-LAYOUT-021
    last_verified_commit: null

  - id: NOTCH-LAYOUT-021
    title: Compact indicators sit one point closer to the camera edge
    status: superseded
    statement: The compact island keeps its physical camera cutout plus 38pt visible extension on each side, preserving the 261pt total width for a 185pt cutout. Each indicator uses a 46pt layout lane so the left and right indicators move another 1pt toward the camera compared with NOTCH-LAYOUT-020, their outer breathing room reaches 11pt, and the 24pt quota indicator remains 3pt clear of the camera edge. The left ChatGPT mark retains its 18pt optical correction. Activity state, quota style, and expansion must not change this balance or the 420pt expanded-card width.
    rationale: Real-notch review of the 44pt lanes still showed slightly too much perceived separation between the two indicators. A 46pt lane provides a restrained final inward adjustment while retaining visible clearance from the physical camera cutout.
    source: user-request
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback, expanded-card-width]
    examples:
      positive: A 185pt camera cutout still produces a 261pt island, while two 46pt indicator lanes leave a 169pt center spacer and keep the 24pt quota ring 3pt outside the camera edge.
      negative: Increasing the compact island's total width, reducing camera clearance below 3pt, or applying the inward shift to only one activity or quota style.
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-020]
    superseded_by: NOTCH-LAYOUT-022
    last_verified_commit: null

  - id: NOTCH-LAYOUT-022
    title: Compact quota ring keeps a one-point camera clearance
    status: superseded
    statement: The compact island keeps its physical camera cutout plus 38pt visible extension on each side, preserving the 261pt total width for a 185pt cutout. Each indicator uses a 50pt layout lane so the left and right indicators move another 2pt toward the camera compared with NOTCH-LAYOUT-021, their outer breathing room reaches 13pt, and the 24pt quota indicator keeps exactly 1pt of geometric clearance from the camera edge. The left ChatGPT mark retains its 18pt optical correction. Activity state, quota style, and expansion must not change this balance or the 420pt expanded-card width.
    rationale: The user explicitly requested reducing the remaining camera clearance from 3pt to 1pt after real-notch review. A 50pt lane reaches that target without widening the compact island or geometrically placing the visible 24pt indicator beneath the camera cutout.
    source: user-request
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback, expanded-card-width]
    examples:
      positive: A 185pt camera cutout still produces a 261pt island, while two 50pt indicator lanes leave a 161pt center spacer and keep the 24pt quota ring 1pt outside the camera edge.
      negative: Increasing the compact island's total width, allowing the ring frame to cross beneath the camera cutout, or applying the inward shift to only one activity or quota style.
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-021]
    superseded_by: NOTCH-LAYOUT-023
    last_verified_commit: null

  - id: NOTCH-LAYOUT-023
    title: Compact quota rendering stays inside its one-point camera clearance
    status: superseded
    statement: The compact island retains its 261pt width for a 185pt camera cutout, its 50pt indicator lanes, and the 24pt quota indicator's 1pt geometric camera clearance. The ring track, quota arc, wave-ball border, and completion pulse must render entirely inside that 24pt indicator frame. With Reduce Motion disabled, completion still shows one restrained pulse that grows from 0.84 scale to 1.00 scale while fading; it must never expand beyond the indicator frame. Reduce Motion continues to suppress the pulse.
    rationale: Physical-notch inspection showed that the former centered strokes and 1.32-scale completion pulse exceeded the nominal 24pt frame and visibly entered the camera cutout even though layout geometry reported 1pt clearance. Inset strokes and a contained inward-to-edge pulse preserve the requested close spacing without hiding animation beneath the camera.
    source: user-confirmed-incident
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine]
    examples:
      positive: The 24pt ring remains 1pt from the camera in idle, running, and completed states, while completion visibly pulses from a smaller circle to the normal ring edge and fades without crossing the camera boundary.
      negative: Drawing any ring stroke outside the 24pt frame, restoring a completion scale above 1.00, widening the island to hide the overflow, or showing the pulse when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and inspect the camera-side edge"
    supersedes: [NOTCH-LAYOUT-022]
    superseded_by: NOTCH-LAYOUT-024
    last_verified_commit: null

  - id: NOTCH-LAYOUT-024
    title: Compact completion pulse visibly contracts inside the camera-safe frame
    status: superseded
    statement: The compact island retains its 261pt width for a 185pt camera cutout, its 50pt indicator lanes, and the 24pt quota indicator's 1pt geometric camera clearance. The ring track, quota arc, wave-ball border, and completion pulse render entirely inside the 24pt indicator frame. With Reduce Motion disabled, completion begins with one clearly visible full-size current-color ring, then contracts inward from 1.00 scale to 0.70 scale while fading over 0.62 seconds. The transition begins after the initial completed frame is rendered so SwiftUI cannot collapse both endpoints into an invisible update. Reduce Motion continues to suppress the pulse.
    rationale: The first contained version grew from 0.84 to 1.00 scale and faded too subtly to perceive on the physical notch; it also read as outward motion rather than the requested inward completion cue. Starting at the safe outer edge and visibly shrinking inward preserves the camera boundary while making the direction legible.
    source: user-feedback
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine]
    examples:
      positive: On completion, a bright full-size ring appears at the existing 24pt edge, contracts toward the percentage text, and fades without crossing the camera boundary.
      negative: Expanding the pulse outward, starting and ending the state in one unrendered frame, making the pulse imperceptibly faint, exceeding 1.00 scale, or showing it when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm visible inward motion"
    supersedes: [NOTCH-LAYOUT-023]
    superseded_by: NOTCH-LAYOUT-025
    last_verified_commit: null

  - id: NOTCH-LAYOUT-025
    title: Compact completion uses one contained clockwise orbit
    status: superseded
    statement: The compact island retains its 261pt width for a 185pt camera cutout, its 50pt indicator lanes, and the 24pt quota indicator's 1pt geometric camera clearance. The ring track, quota arc, wave-ball border, and completion animation render entirely inside the 24pt indicator frame. With Reduce Motion disabled, completion shows one small bright point with a restrained current-color tail travelling clockwise around the indicator exactly once over 0.9 seconds, fading in and out without covering the percentage text. Reduce Motion suppresses the orbit while preserving the static completed state.
    rationale: >-
      Frame-by-frame physical-notch capture showed that radial contraction was technically running but visually disappeared: its full-size start overlapped the existing ring, while its smaller frames moved underneath the percentage glyph and shadow. Motion along the circumference stays outside the text, remains legible at 24pt, and preserves the camera-safe boundary without widening the island.
    source: user-feedback-and-frame-capture
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine]
    examples:
      positive: On completion, one subtle comet-like highlight makes a single clockwise lap around the quota ring or wave ball, then disappears while the completed state remains static.
      negative: Hiding radial motion underneath the percentage, looping the orbit continuously, exceeding the 24pt frame, widening the compact island, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm one visible contained clockwise orbit"
    supersedes: [NOTCH-LAYOUT-024]
    superseded_by: NOTCH-LAYOUT-026
    last_verified_commit: null

  - id: NOTCH-LAYOUT-026
    title: Compact completion scatters seven contained particles
    status: superseded
    statement: The compact island retains its 261pt width for a 185pt camera cutout, its 50pt indicator lanes, and the 24pt quota indicator's 1pt geometric camera clearance. The ring track, quota arc, wave-ball border, and completion animation render entirely inside the 24pt indicator frame. With Reduce Motion disabled, completion emits seven small green and white particles from near the percentage text, easing outward in distinct directions with at most 0.12 seconds of stagger and disappearing after at most 0.9 seconds. The percentage remains readable above the particles. Reduce Motion suppresses the particles while preserving the static completed state.
    rationale: >-
      The contained clockwise orbit was visible but felt mechanical. A small, staggered radial scatter gives completion a lighter celebratory cue while keeping every particle inside the same camera-safe 24pt frame and leaving the compact notch geometry unchanged.
    source: user-request
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine]
    examples:
      positive: On completion, seven tiny green and white particles emerge around the percentage, travel toward distinct edges inside the indicator, and disappear once while the percentage stays readable.
      negative: Looping the particles continuously, placing particles beyond the 24pt frame, hiding the percentage, widening the compact island, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm the contained particle scatter is visible and restrained"
    supersedes: [NOTCH-LAYOUT-025]
    superseded_by: NOTCH-LAYOUT-027
    last_verified_commit: null

  - id: NOTCH-LAYOUT-027
    title: Compact completion scatters particles inside and outside the quota ring
    status: superseded
    statement: The compact island retains its 261pt width for a 185pt camera cutout, its 50pt indicator lanes, and the 24pt quota indicator's 1pt geometric camera clearance. With Reduce Motion disabled, completion emits seven small green and white particles from near the percentage text toward the inside of the quota ring, while six additional particles travel from the ring toward its top, right, and bottom exterior. Exterior particles may leave the 24pt ring frame, but must remain inside the 50pt by 32pt compact indicator lane and must never travel beyond the ring on its camera-facing left edge. Both layers use at most 0.12 seconds of stagger and disappear after at most 0.9 seconds. The percentage remains readable above the particles. Reduce Motion suppresses both layers while preserving the static completed state.
    rationale: >-
      A contained scatter made the inner burst visible but did not provide a clear release beyond the ring. Splitting completion into an inner burst and an asymmetric outer burst provides both cues while using the generous screen-side lane space and preserving the one-point camera-side boundary.
    source: user-request
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine]
    examples:
      positive: On completion, one group of particles spreads around the percentage inside the quota ring while a second group clears the ring toward the safe top, right, and bottom edges, then both disappear once.
      negative: Sending exterior particles toward the camera cutout, exceeding the compact lane height or width, hiding the percentage, widening the compact island, looping continuously, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm both particle layers are visible without entering the camera cutout"
    supersedes: [NOTCH-LAYOUT-026]
    superseded_by: NOTCH-LAYOUT-028
    last_verified_commit: null

  - id: NOTCH-LAYOUT-028
    title: Compact inner and outer completion particles remain clearly visible
    status: superseded
    statement: The compact island retains its 261pt width for a 185pt camera cutout, its 50pt indicator lanes, and the 24pt quota indicator's 1pt geometric camera clearance. With Reduce Motion disabled, completion emits seven 1.8pt to 2.4pt green and white particles from near the percentage text toward the inside of the quota ring, while six additional particles travel from the ring toward its top, right, and bottom exterior. Exterior particles may leave the 24pt ring frame, but must remain inside the 50pt by 32pt compact indicator lane and must never travel beyond the ring on its camera-facing left edge. Particles fade in quickly, remain fully visible through the middle of their travel, briefly grow to full scale, then ease down while fading. Both layers use at most 0.12 seconds of stagger and disappear after at most 0.9 seconds. The percentage remains readable above the particles. Reduce Motion suppresses both layers while preserving the static completed state.
    rationale: >-
      The first two-layer scatter had the correct directions but its small particles faded and shrank too early to read clearly on a physical notch. Slightly larger particles, a sustained full-opacity phase, and a short grow-then-settle motion improve legibility without increasing travel distance or spending the camera-side clearance.
    source: user-feedback
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine]
    examples:
      positive: On completion, both the inner and outer particle groups are immediately legible, remain bright while separating, and then disappear once without changing the quota ring position.
      negative: Fading before the two layers separate, shrinking throughout the whole animation, sending exterior particles toward the camera cutout, hiding the percentage, widening the compact island, looping continuously, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm the brighter inner and outer particles remain restrained"
    supersedes: [NOTCH-LAYOUT-027]
    superseded_by: NOTCH-LAYOUT-029
    last_verified_commit: null

  - id: NOTCH-LAYOUT-029
    title: Compact completion uses a camera-clear mini firework
    status: superseded
    statement: The compact island retains its 261pt total width for a 185pt camera cutout and its 50pt indicator lanes. The right quota indicator and its complete animation move 1pt toward the screen edge, increasing the visible camera clearance from 1pt to 2pt without moving the left ChatGPT mark or widening the island. With Reduce Motion disabled, completion begins with one white ignition flash, emits seven 1.8pt to 2.4pt green and white particles inside the quota ring, then sends six additional particles toward the top, right, and bottom exterior. Exactly two exterior particles use warm coral red rather than the deep-red quota warning color. Three four-point endpoint sparks follow, with two white and one warm coral red. All firework layers finish within 0.9 seconds, remain inside the 50pt by 32pt compact indicator lane, never travel beyond the ring on its camera-facing left edge, and stay behind the readable percentage. Reduce Motion suppresses the firework while preserving the static completed state.
    rationale: >-
      Real-notch review found that the former one-point camera gap made the left side of the brighter particle effect look visually clipped even though its geometry did not cross the camera boundary. Moving only the right indicator one point outward creates a clean two-point visual separation. A white ignition, warm-coral accents, and three endpoint stars provide the requested firework character without reusing the deep-red quota warning semantic.
    source: user-confirmed-physical-notch-feedback
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine, quota-warning-colors]
    examples:
      positive: On completion, the right indicator sits 2pt from the camera, flashes white, bursts green, white, and two coral particles in two layers, then shows three small endpoint stars and settles within 0.9 seconds.
      negative: Leaving the brighter effect visually clipped against a 1pt camera gap, moving the left icon, widening the island, using quota-critical deep red, sending particles toward the camera cutout, hiding the percentage, looping continuously, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm the 2pt left clearance, warm-coral accents, ignition flash, and endpoint stars"
    supersedes: [NOTCH-LAYOUT-028]
    superseded_by: NOTCH-LAYOUT-030
    last_verified_commit: null

  - id: NOTCH-LAYOUT-030
    title: Compact completion shows a complete firework on both sides
    status: superseded
    statement: The compact island retains its 261pt total width for a 185pt camera cutout and its 50pt indicator lanes. The right quota indicator and its complete animation move 6pt toward the screen edge from the lane center, leaving 7pt between the 24pt ring and both the camera edge and the outer edge of the 38pt wing; the left ChatGPT mark does not move. With Reduce Motion disabled, completion begins with one white ignition flash, emits seven 1.8pt to 2.4pt green and white particles inside the quota ring, then sends nine exterior particles around the complete circumference, including left-up, direct-left, and left-down directions. Exactly two exterior particles use warm coral red rather than the deep-red quota warning color. Four four-point endpoint sparks follow, including a direct-left white spark and one warm coral-red spark. All firework layers and their declared glow radii remain outside the physical camera cutout and inside the compact wing, finish within 0.9 seconds, and stay behind the readable percentage. Reduce Motion suppresses the firework while preserving the static completed state.
    rationale: >-
      Physical-notch review showed that a two-point ring clearance still made the left half of the firework look absent: the animation had deliberately omitted exterior particles on the camera side. Centering the 24pt ring in the 38pt visible wing creates equal seven-point ring clearances, enough for a guarded full-circumference burst and its glow on both sides without widening the island.
    source: user-confirmed-physical-notch-feedback
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine, quota-warning-colors]
    examples:
      positive: On completion, visible particles and a white endpoint star appear to the left of the ring as well as the top, right, and bottom, while the ring keeps equal seven-point wing clearances and no glow enters the camera cutout.
      negative: Omitting the left exterior burst, clipping its glow under the camera, moving the left icon, widening the island, using quota-critical deep red, hiding the percentage, looping continuously, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: loop completion transitions on a physical notch and confirm the complete left firework and equal 7pt ring clearances"
    supersedes: [NOTCH-LAYOUT-029]
    superseded_by: NOTCH-LAYOUT-031
    last_verified_commit: null

  - id: NOTCH-LAYOUT-031
    title: Compact completion keeps a balanced narrow firework envelope
    status: superseded
    statement: The compact island retains its 261pt total width for a 185pt camera cutout and its 50pt indicator lanes. The right quota indicator remains centered in the 38pt visible wing with 7pt between the 24pt ring and both the camera edge and the outer screen edge; the left ChatGPT mark does not move. With Reduce Motion disabled, completion preserves the full-circumference inner and outer firework, including its left-up, direct-left, and left-down particles, four endpoint sparks, warm-coral accents, white ignition, particle sizes, vertical travel, brightness, and timing. Only horizontal particle and endpoint-spark travel is compressed. The declared particle and spark geometry, including glow radii, must occupy no more than 32pt horizontally and leave at least 3pt between the firework and each edge of the visible wing. The animation finishes within 0.9 seconds and stays behind the readable percentage. Reduce Motion suppresses the firework while preserving the static completed state.
    rationale: >-
      Physical-notch review showed that the complete 35.1pt firework left only 1.8pt beside the camera and 1.1pt at the screen edge, making the right side look cramped. Compressing horizontal travel preserves a clearly visible complete burst and its vertical celebration while restoring balanced breathing room without widening or narrowing the compact island.
    source: user-confirmed-physical-notch-feedback
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state, completion-animation]
      exclude: [menu-bar-fallback, expanded-card-width, activity-state-machine, quota-warning-colors]
    examples:
      positive: On completion, the full left and right burst remains visible, while its complete glow-aware horizontal envelope stays within 32pt and leaves at least 3pt to both wing edges around the centered ring.
      negative: Widening or narrowing the island, moving the ring, clipping the left burst, compressing vertical travel, weakening the firework, using quota-critical deep red, hiding the percentage, looping continuously, or animating when Reduce Motion is enabled.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
