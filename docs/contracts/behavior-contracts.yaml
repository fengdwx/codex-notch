  - id: PRIVACY-BOUNDARY-005
    title: Local authentication and conversation content must not be persisted or exposed
    status: active
    statement: Authentication tokens are used only in process memory; they must not be written to the repository, app cache, or logs; user-message bodies must not be displayed or recorded; the no-notch fallback must not broaden content exposure.
    rationale: The app reads local ChatGPT/Codex login state and session logs, so minimizing exposure is a non-negotiable boundary.
    source: technical-constraint
    owner: project-maintainer
    risk: critical
    scope:
      include: [auth-reader, usage-client, rollout-monitor, logs, fallback-menu]
      exclude: [user-provided project names and thread identifiers needed for navigation]
    examples:
      positive: The Authorization header from a usage request does not enter logs; the expanded list shows only summary titles and project names.
      negative: Committing auth.json, printing a token, caching the complete usage response, or displaying a user-message body.
    guards:
      - Tests/CodexNotchTests/CodexAuthReaderTests.swift
      - "manual: sensitive-diff and runtime-log review until a dedicated secret scanner exists"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: PACKAGE-VERIFY-006
    title: A distributable app must come from a verified build
    status: active
    statement: Any CodexNotch.app claimed to be runnable or distributable must be built from the current worktree and verified through the bundle, Info.plist, and codesign checks; a release ZIP must be generated by the release script.
    rationale: Passing source tests does not prove that the app bundle launches or is correctly signed.
    source: technical-constraint
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, local-release]
      exclude: [remote-release-upload]
    examples:
      positive: './scripts/verify.sh builds and verifies dist/CodexNotch.app.'
      negative: Running only `swift test` and claiming that the release is installable, or verifying an old bundle and then replacing its binary with a new one.
    guards:
      - scripts/build_app.sh
      - scripts/verify_app.sh
      - scripts/verify.sh
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: PACKAGE-DMG-018
    title: Local releases include a verified disk image
    status: active
    statement: The release script must retain the ZIP archive and also create a matching read-only DMG that contains CodexNotch.app beside an Applications shortcut targeting /Applications; it must verify the image, mount it into a temporary directory, verify the shortcut target, and verify the mounted app bundle before reporting success.
    rationale: A DMG gives ordinary macOS users a familiar drag-to-Applications installation flow, but a file ending in .dmg is not evidence that its payload is complete or runnable.
    source: user-request
    owner: project-maintainer
    risk: medium
    scope:
      include: [local-release, disk-image, build, bundle]
      exclude: [remote-release-upload, developer-id-signing, notarization]
    examples:
      positive: Running './scripts/release.sh' creates matching ZIP and DMG artifacts plus SHA-256 files, and the mounted DMG contains an app that passes the bundle verification script beside an Applications shortcut pointing to /Applications.
      negative: Replacing the ZIP with an unverified DMG, publishing a DMG that omits the app bundle or Applications shortcut, pointing the shortcut somewhere other than /Applications, or claiming that a DMG alone removes the macOS trust warning.
    guards:
      - scripts/release.sh
      - scripts/verify_app.sh
      - "manual: hdiutil verify and read-only mount occur during ./scripts/release.sh"
    supersedes: []
    superseded_by: null
    last_verified_commit: null

  - id: APP-IDENTITY-007
    title: The app bundle provides an original and complete icon
    status: superseded
    statement: CodexNotch.app's Info.plist must declare the CodexNotch icon and Resources must contain a complete .icns representation; the icon uses an original vector design with a deep-green terminal window, a small notch slot at the top, and a green `>_` prompt, with no account, authentication, or conversation data.
    rationale: Finder, Launchpad, and the installer need a stable recognizable app identity; a clear terminal outline and high-contrast green prompt should preserve the product's Codex identity at small sizes, while the small top notch echoes the physical notch. Icon generation must not broaden local-data exposure or appropriate another product's brand assets.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [build, bundle, finder, launchpad]
      exclude: [notch-screens, chatgpt-assets, user-data]
    examples:
      positive: The built app contains CodexNotch.icns in Resources, and the file includes a 1024px representation with the original deep-green terminal `>_` graphic.
      negative: Info.plist points to a missing icon, the repository contains only a design source without bundling the icon into the app, or the icon is drawn as a large bowl-like outline without terminal meaning.
    guards:
      - Resources/AppIcon.svg
      - scripts/build_icon.sh
      - scripts/verify_app.sh
      - "manual: inspect the app icon in Finder or Launchpad"
    supersedes: []
    superseded_by: APP-IDENTITY-016
    last_verified_commit: 9fd7a89

