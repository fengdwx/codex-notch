contracts:
  - id: NOTCH-LAYOUT-001
    title: Compact island must align with the physical notch safe areas
    status: superseded
    statement: The compact notch's left and right content always stays centered in its respective safe area, clear of the camera cutout and above the bottom of the notch; both indicators share a 24pt alignment container. The ChatGPT mark may use 22pt optical correction, and switching the right indicator between a ring and wave ball or expanding the card must not change the container size or disrupt the visual balance of the two wings.
    rationale: Users first perceive the physical-notch geometry and the visual balance between the two wings; bad positioning, mechanically equal sizing, or a changed right-side silhouette directly harms the appearance.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback]
    examples:
      positive: The left mark and right quota indicator sit in the two notch wings inside shared 24pt alignment containers; the smaller left mark balances the visual weight and the compact panel's top edge touches the top of the screen.
      negative: The content hangs below the notch, the quota indicator is covered by the camera cutout, or the wave ball, ring, or hover state changes the size of either wing indicator.
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: physical-notch compact-state inspection"
    supersedes: []
    superseded_by: NOTCH-LAYOUT-013
    last_verified_commit: 74cd749

  - id: NOTCH-LAYOUT-013
    title: Compact island preserves safe-area balance with 20pt optical correction for the left GPT mark
    status: superseded
    statement: The compact notch's left and right content always stays centered in its respective safe area, clear of the camera cutout and above the bottom of the notch; both indicators share a 24pt alignment container. The left ChatGPT mark and running echo use 20pt optical correction, and switching the right indicator between a ring and wave ball or expanding the card must not change the container size or disrupt the visual balance of the two wings.
    rationale: The left mark has greater visual density than the right quota ring, and 22pt looks too large on a real notch; reducing it to 20pt preserves recognition and running feedback while bringing the visual weight of both wings closer together.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback]
    examples:
      positive: The left GPT mark and running echo are centered at 20pt inside a 24pt container, the right 24pt quota indicator keeps its original size, and the compact panel's top edge touches the top of the screen.
      negative: Shrinking the entire left safe area or moving the right quota indicator to compensate for the mark, or using different left-mark body sizes for running, completed, and idle states.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-001]
    superseded_by: NOTCH-LAYOUT-014
    last_verified_commit: 9fc374b

  - id: NOTCH-LAYOUT-014
    title: Compact island preserves safe-area balance with 18pt optical correction for the left GPT mark
    status: active
    statement: The compact notch's left and right content always stays centered in its respective safe area, clear of the camera cutout and above the bottom of the notch; both indicators share a 24pt alignment container. The left ChatGPT mark and running echo use 18pt optical correction, and switching the right indicator between a ring and wave ball or expanding the card must not change the container size or disrupt the visual balance of the two wings.
    rationale: The left mark still has greater visual density than the right quota ring, and 20pt remains slightly too large on a real notch; reducing it to 18pt preserves recognition and running feedback while further reducing the left wing's visual weight.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, compact-state]
      exclude: [menu-bar-fallback]
    examples:
      positive: The left GPT mark and running echo are centered at 18pt inside a 24pt container, the right 24pt quota indicator keeps its original size, and the compact panel's top edge touches the top of the screen.
      negative: Shrinking the entire left safe area or moving the right quota indicator to compensate for the mark, or using different left-mark body sizes for running, completed, and idle states.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - "manual: physical-notch compact-state inspection across idle, running and completed states"
    supersedes: [NOTCH-LAYOUT-013]
    superseded_by: null
    last_verified_commit: ff03e1c

  - id: NOTCH-COMPATIBILITY-015
    title: A notch-aware app must not fall back to camera safe-area compatibility mode
    status: active
    statement: CodexNotch.app's Info.plist must set `NSPrefersDisplaySafeAreaCompatibilityMode` to false so the compact island, calculated from NSScreen safe and auxiliary areas, remains in the same screen coordinate system as the physical camera opening; Finder's “Scale to fit below built-in camera” compatibility strategy must not change the notch width or vertical anchor.
    rationale: Screen diagonal, native resolution, and chip generation are insufficient to determine notch coordinates on 14-inch models; without an explicit opt-out, Finder can scale app content according to a per-user compatibility setting and produce inconsistent notch geometry on otherwise identical machines.
    source: incident
    owner: project-maintainer
    risk: medium
    scope:
      include: [notch-screens, bundle, finder, safe-area-coordinates]
      exclude: [menu-bar-fallback, quota-semantics, session-monitoring]
    examples:
      positive: The built app explicitly disables safe-area compatibility mode, and the compact island remains centered from NSScreen's auxiliaryTopLeftArea and auxiliaryTopRightArea while aligning with the camera opening.
      negative: Info.plist lacks the declaration and lets Finder run with “Scale to fit below built-in camera,” producing inconsistent compact-notch width or top anchors between 14-inch machines.
    guards:
      - Resources/Info.plist
      - scripts/verify_app.sh
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: inspect compact island alignment on a physical-notch Mac after a fresh launch"
    supersedes: []
    superseded_by: null
    last_verified_commit: 3ae33b4

  - id: NOTCH-MOTION-002
    title: Expansion proceeds downward from the compact island
    status: active
    statement: Hover expansion reveals content downward from the existing compact island; the outer window must not continuously resize during SwiftUI layout or cause flicker, upward expansion, a centered burst, or lingering mouse interception.
    rationale: A fixed canvas and inner-island animation are necessary boundaries for avoiding window jumping and historical layout crashes.
    source: incident
    owner: project-maintainer
    risk: high
    scope:
      include: [notch-screens, hover-expand, hover-collapse]
      exclude: [menu-bar-fallback]
    examples:
      positive: The panel prepares the final canvas first, SwiftUI expands the visible island only downward, and the transparent canvas is reclaimed after collapse.
      negative: Adjusting the NSPanel size frame by frame with a timer, or expanding both upward and downward from the middle of the physical notch.
    guards:
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - docs/decisions/001-fixed-canvas-notch-motion.md
      - "manual: hover expansion and collapse on physical-notch hardware"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: EXPANDED-APPEARANCE-009
    title: The expanded card can switch live between system glass and pure black
    status: superseded
    statement: Settings must provide glass and black expanded-card appearances and apply the choice immediately, with glass as the default. macOS 26 and later use native system Liquid Glass, supported older systems use a native translucent Material fallback, and black mode keeps the existing pure-black surface. This setting changes only the expanded-card material; it must not change the compact notch's pure-black surface, fixed transparent canvas, expansion direction, or window geometry.
    rationale: Native system materials follow desktop content and pointer behavior for a consistent modern macOS appearance, while the pure-black option preserves a high-contrast preference; isolating material choice from window geometry avoids reintroducing expansion jumps and mouse-interception regressions.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [expanded-state, settings, notch-screens]
      exclude: [compact-state, menu-bar-fallback]
    examples:
      positive: Choosing glass immediately shows the system-glass surface on the real expanded card, choosing black immediately restores pure black, and the collapsed compact notch remains pure black.
      negative: The glass setting makes the compact notch transparent, requires a restart, cannot expand on an older system, or changes the NSPanel size frame by frame to animate the material.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - docs/decisions/002-native-liquid-glass-with-fallback.md
      - "manual: switch both appearances and inspect expansion on physical-notch hardware"
    supersedes: []
    superseded_by: EXPANDED-APPEARANCE-011
    last_verified_commit: 916f72b

  - id: EXPANDED-APPEARANCE-011
    title: The expanded card uses a stable pure-black surface
    status: active
    statement: The visible notch surface in both compact and expanded states must always use a pure-black background, and Settings must not offer a glass appearance that does not hold during normal use; the hidden canvas remains fully transparent. This choice must not change the fixed transparent canvas, downward-only expansion, post-collapse canvas reclamation, or window geometry.
    rationale: A physical-notch Mac confirmed that cross-window glass remains black during normal use and becomes white translucent only during a system screenshot, which is not a stable shippable experience; fixed pure black keeps the real display consistent with the Settings promise.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [expanded-state, settings, notch-screens]
      exclude: [menu-bar-fallback]
    examples:
      positive: The card stays pure black during normal hover expansion, Settings keeps only usable expanded-content settings, and the transparent canvas is reclaimed after collapse.
      negative: Settings still shows a glass option, or a translucent effect that appears only in the screenshot-compositing path is treated as a pass for normal display.
    guards:
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - docs/decisions/003-abandon-cross-window-liquid-glass.md
      - "manual: inspect the expanded black surface during normal use on physical-notch hardware"
    supersedes: [EXPANDED-APPEARANCE-009]
    superseded_by: null
    last_verified_commit: 53beec8

  - id: DISPLAY-TRANSITION-010
    title: Projection and screen changes must not trigger menu-bar fallback recursion
    status: active
    statement: The app must remain alive when projection, disconnection, or another screen-parameter change switches between the notch window and the menu-bar fallback. Visibility and autosave preferences written by NSStatusItem must not be treated as app settings that trigger another running-state render; the runtime coordinator responds only to app preferences that actually affect its state or layout.
    rationale: macOS synchronously writes UserDefaults while creating, showing, or hiding an NSStatusItem; broadly observing every preference and immediately rebuilding the fallback causes re-entrant recursion and a main-thread stack overflow.
    source: incident
    owner: project-maintainer
    risk: high
    scope:
      include: [screen-parameter-changes, notch-screens, menu-bar-fallback, settings]
      exclude: [quota-fetching, rollout-parsing]
    examples:
      positive: The app continues running after projection starts or stops, the menu-bar fallback appears or hides normally, and a recent-conversation-count change still updates layout live.
      negative: A screen change caused by projection repeatedly creates NSStatusItem, or a system menu-bar visibility preference causes render recursion until the app exits.
    guards:
      - Tests/CodexNotchTests/NotchRuntimePreferencesTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: connect and disconnect screen projection while a task is running"
    supersedes: []
    superseded_by: null
    last_verified_commit: 14271f5

  - id: ACTIVITY-STATE-003
    title: Active tasks take priority and completion remains visible
    status: active
    statement: The compact notch shows the running state when any task is active; when no task is active but a recent completion exists, it shows the completion checkmark; when neither exists, it still shows quota; a new task must override an old completed state.
    rationale: Users need to distinguish running, just completed, and quota-only states without expanding the card.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, expanded-state, rollout-session-monitoring]
      exclude: [task-termination]
    examples:
      positive: When a completion record exists, the collapsed notch still shows a green checkmark on the left; when a new session appears, it immediately changes to the running state.
      negative: The completion checkmark is visible only inside the expanded card, or an old completed state overrides a new running task.
    guards:
      - Tests/CodexNotchTests/NotchPresentationReducerTests.swift
      - Tests/CodexNotchTests/ActiveSessionStoreTests.swift
      - "manual: observe compact completion state after a real task finishes"
    supersedes: []
    superseded_by: null
    last_verified_commit: 0d37196

  - id: QUOTA-SEMANTICS-004
    title: Weekly quota is clearly expressed as a remaining percentage
    status: superseded
    statement: The right side prioritizes the weekly quota's remaining percentage; the number stays inside the ring or wave ball; the ring gap starts at 12 o'clock and progresses clockwise, with high quota green and below 20% red. When a task is running and Reduce Motion is disabled, the ring gradient flows gently along the remaining-quota arc; idle and completed states keep a still gradient and must not retain an independently rotating highlight arc. The wave ball rises and falls only while a task is running and Reduce Motion is disabled, and keeps a still liquid level while idle or completed. Expanded quota, reset, and recent-conversation text uses readable sizes and matching line heights; the quota bar is followed first by the current weekly reset timestamp and a second-level countdown; the full “N reset credits available” row is clickable, and the card expands only downward to list each `rate-limit-reset-credits` item with `status=available`, its exact expiry time, and a second-level countdown without repeating the reset-credit name. The real notch in Settings is the live preview, with no duplicate static preview card; the lower-right of the expanded panel must provide a Settings entry.
    rationale: This is the app's primary information goal and must not become blurry, duplicated, or a misuse of a scrolling window because of animation, layout, or tiny text. The weekly window's reset_at and a reset credit's expires_at are different information and must be shown separately. Every row currently uses the same name, so repeating it wastes readable time. Reset-credit details are read-only and must not trigger a reset action in the notch. The live notch is more trustworthy than a fabricated static Settings preview, and continuous idle motion would incorrectly imply that a task is still running; a gradient flowing along the remaining-quota arc makes the quota itself feel active rather than using an independently rotating highlight.
    source: user-confirmed
    owner: project-maintainer
    risk: medium
    scope:
      include: [compact-state, quota-expanded-state, settings]
      exclude: [cost-estimation]
    examples:
      positive: When a weekly window exists, show its remaining number; expanded quota, reset, and recent-conversation text is readable; the current weekly reset timestamp and countdown remain below the quota bar; every point in the “N reset credits available” row is clickable and reveals all `status=available` `expires_at` values and countdowns in large type without repeating Full reset; wave-ball text does not cover the liquid and the ball moves only while a task runs; the ring gradient flows along the remaining-quota arc only while a task runs; Settings has no duplicate preview card and the expanded panel can open Settings; exactly 20% is still green.
      negative: Fabricating weekly quota from only a rolling window, using the quota window's reset_at instead of reset-credit expires_at, showing redeemed credits, triggering a reset action, or expanding reset details upward; a wave or ring gradient keeps moving while idle, the ring has an extra independently rotating highlight arc, or Settings keeps a static preview that is not synchronized with the real notch.
    guards:
      - Tests/CodexNotchTests/CodexUsageClientTests.swift
      - Tests/CodexNotchTests/NotchTextTests.swift
      - Tests/CodexNotchTests/QuotaDisplayStyleTests.swift
      - Tests/CodexNotchTests/NotchGeometryTests.swift
      - "manual: expanded quota panel inspection"
      - "manual: ring and wave-ball inspection"
    supersedes: []
    superseded_by: QUOTA-SEMANTICS-008
    last_verified_commit: 2796cfe

